[Settings]
language = en
folder = ~/Pictures/Wallpapers
backend = awww
monitors = All
fill = fill
sort = name
color = #000000
subfolders = True
show_hidden = False
show_gifs_only = False
post_command = matugen image "$wallpaper" --source-color-index 0 && hyprctl reload
swww_transition_type = grow
swww_transition_step = 90
swww_transition_angle = 0
swww_transition_duration = 1.5
swww_transition_fps = 60
