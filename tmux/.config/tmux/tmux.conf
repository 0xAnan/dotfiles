set -g @vim_navigator_mapping_down ""
set -g @continuum-restore "off"
set -g @continuum-save-interval "0"
set -g @continuum-boot "off"

if-shell "[ -f /etc/tmux.conf ]" "source-file /etc/tmux.conf"

set -g @plugin "tmux-plugins/tmux-prefix-highlight"

# Let tmux set TERM for panes from default-terminal.  /etc/tmux.conf exports
# TERM globally, which can confuse fullscreen TUIs when clients reattach.
set-environment -gu TERM
set-option -g default-terminal "tmux-256color"

# Advertise Kitty capabilities explicitly.  Modern TUIs such as Codex use focus,
# extended keys, cursor style, and synchronized updates; partial detection can
# leave panes stale until tmux is forced to redraw them.
set-option -g terminal-features[3] "xterm-kitty:RGB:clipboard:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:overline:strikethrough:sync:title:usstyle"
set-option -gu terminal-features[4]
set-option -gu terminal-features[5]
set-option -gu terminal-features[6]
set-option -gu terminal-overrides[3]
set-option -g terminal-overrides[3] "xterm-kitty:Tc"
set-option -gu terminal-overrides[4]
set-option -gu terminal-overrides[5]
set-option -gu terminal-overrides[6]
set-option -gu terminal-overrides[7]
set-option -gu terminal-overrides[8]
set-option -gu terminal-overrides[9]
set-option -gu terminal-overrides[10]
set-option -gu terminal-overrides[11]
set-option -gu terminal-overrides[12]
set-option -gu terminal-overrides[13]
set-option -gu terminal-overrides[14]
set-option -gu terminal-overrides[15]
set-option -gu terminal-overrides[16]
set-option -g focus-events on
set-option -g extended-keys on
set-option -g set-clipboard on
set-option -g allow-passthrough on
set-option -g mouse on
set-option -g cursor-style blinking-bar
set-option -g cursor-colour "#f5c2e7"
set-option -g mode-style "fg=#11111b,bg=#f5c2e7,bold"

# Agent state is tracked separately below.  Generic tmux activity is disabled
# because opening a pane or printing a shell prompt is not an agent alert.
set-option -gw monitor-activity off
set-option -gw monitor-bell on
set-option -g activity-action other
set-option -g bell-action any
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g status-interval 3

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
unbind-key -n C-j
unbind-key -T copy-mode-vi C-j
bind-key -n C-MouseDown1Pane if-shell -F "#{mouse_hyperlink}" "run-shell -b '~/.config/tmux/open_hyperlink.sh #{q:mouse_hyperlink}'" "select-pane -t = \\; send-keys -M"
bind-key -n MouseDown1Status if-shell -F "#{==:#{mouse_status_range},vpnip}" "run-shell -b '~/.config/tmux/copy_vpn_ip.sh'" "if-shell -F '#{==:#{mouse_status_range},agentalert}' \"run-shell -b '~/.config/tmux/agent_alert_open.sh'\" \"send-keys -M\""
bind-key w choose-tree -Zw -F "#{?window_id,#[fg=#89b4fa]  #{window_index}: #[fg=#cdd6f4]#{window_name} #[fg=#6c7086]#{?#{==:#{window_panes},1},,#{window_panes} panes},#[fg=#cba6f7]  #[fg=#cdd6f4]#{session_name} #[fg=#6c7086]#{session_windows} windows}"
bind-key ? display-popup -E -b rounded -S "fg=#89b4fa" -s "fg=#cdd6f4,bg=#1e1e2e" -T " tmux cheatsheet " -w 74 -h 86% "bash ~/.config/tmux/cheatsheet.sh"
bind-key / display-popup -E -b rounded -S "fg=#89b4fa" -s "fg=#cdd6f4,bg=#1e1e2e" -T " tmux cheatsheet " -w 74 -h 86% "bash ~/.config/tmux/cheatsheet.sh"

set -g @prefix_highlight_prefix_prompt "C-a"
set -g @prefix_highlight_copy_prompt "COPY"
set -g @prefix_highlight_sync_prompt "SYNC"
set -g @prefix_highlight_show_copy_mode "on"
set -g @prefix_highlight_show_sync_mode "on"
set -g @prefix_highlight_fg "#11111b"
set -g @prefix_highlight_bg "#f5c2e7"
set -g @prefix_highlight_copy_mode_attr "fg=#11111b,bg=#a6e3a1,bold"
set -g @prefix_highlight_sync_mode_attr "fg=#11111b,bg=#f9e2af,bold"

# Override status bar styles to create a floating rounded pill look
set -g status-style "bg=default,fg=#cdd6f4"
set -g status-left-style "bg=default,fg=#cdd6f4"
set -g status-right-style "bg=default,fg=#a6adc8"
set -g window-status-style "bg=default,fg=#6c7086"
set -g window-status-current-style "bg=default,fg=#cdd6f4,bold"
# The pill format renders alert colours itself.  Transparent outer alert
# styles prevent inherited /etc/tmux.conf backgrounds from showing through
# the rounded end glyphs as red/magenta corners.
set -g window-status-bell-style "bg=default,fg=#cba6f7,bold"
set -g window-status-activity-style "bg=default,fg=#f9e2af"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#f5c2e7"
set -g pane-border-status off
set -g pane-border-format ""
set -g status-left-length 30
set -g status-right-length 100

# Rounded left session pill (Mauve)
set -g status-left "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=default,nobold] "

# Rounded window list pills (Surface0 background, Blue active)
set -g window-status-separator " "
# Alert priority: action required (Mocha mauve), agent finished (teal), bell
# (mauve), a currently running background agent (yellow), then normal grey.
set -g window-status-format "#{?#{==:#{@agent_alert},action},#[fg=#cba6f7]#[bg=default]#[fg=#11111b]#[bg=#cba6f7]#[bold] ! #I #W #[fg=#cba6f7]#[bg=default]#[nobold],#{?#{==:#{@agent_alert},finished},#[fg=#94e2d5]#[bg=default]#[fg=#11111b]#[bg=#94e2d5]#[bold] ✓ #I #W #[fg=#94e2d5]#[bg=default]#[nobold],#{?window_bell_flag,#[fg=#cba6f7]#[bg=default]#[fg=#11111b]#[bg=#cba6f7]#[bold] ! #I #W #[fg=#cba6f7]#[bg=default]#[nobold],#{?#{==:#{@agent_running},1},#[fg=#f9e2af]#[bg=default]#[fg=#11111b]#[bg=#f9e2af]#[bold] ● #I #W #[fg=#f9e2af]#[bg=default]#[nobold],#[fg=#313244]#[bg=default]#[fg=#cdd6f4]#[bg=#313244] #I #[fg=#a6adc8]#[bg=#313244]#W #[fg=#313244]#[bg=default]}}}}"
set -g window-status-current-format "#[fg=#89b4fa,bg=default]#[fg=#11111b,bg=#89b4fa,bold] #I #[fg=#1e1e2e,bg=#89b4fa,bold]#W #[fg=#89b4fa,bg=default,nobold]"

# Conditional VPN IP pill (Green) + Rounded pane title pill (Blue/Grey split)
set -g status-right "#(~/.config/tmux/agent_alert_status.sh)#(~/.config/tmux/vpn_status.sh)#{prefix_highlight} #[fg=#89b4fa,bg=default]#[fg=#11111b,bg=#89b4fa,bold]鬼 #[fg=#cdd6f4,bg=#313244,nobold] #T #[fg=#313244,bg=default]"
run-shell "~/.config/tmux/plugins/tmux-prefix-highlight/prefix_highlight.tmux"

# Rename in a proper popup instead of drawing an input field over the status
# line.  Prefix+, keeps the familiar binding.
unbind-key ,
bind-key , set-option -gF @rename_popup_target "#{window_id}" \; display-popup -E -b rounded -S "fg=#cba6f7" -s "fg=#cdd6f4,bg=#1e1e2e" -T " Rename window " -w 60 -h 7 "~/.config/tmux/rename.sh window"
bind-key P set-option -gF @rename_popup_target "#{pane_id}" \; display-popup -E -b rounded -S "fg=#f5c2e7" -s "fg=#cdd6f4,bg=#1e1e2e" -T " Rename pane title " -w 60 -h 7 "~/.config/tmux/rename.sh pane"

# Update config reload binding to reload the user's config
bind r source-file ~/.config/tmux/tmux.conf
